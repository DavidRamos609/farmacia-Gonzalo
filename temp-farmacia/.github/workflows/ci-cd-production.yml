name: CI/CD Production Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOCKER_IMAGE: test-build
  PORT: 8000

jobs:
  validate-structure:
    name: 📋 Validate Project Structure
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          echo "🔍 Checking required files..."
          required_files=("Dockerfile" ".dockerignore" ".gitignore")
          
          if [ -f "requirements.txt" ]; then
            required_files+=("requirements.txt")
          fi
          
          if [ -f "package.json" ]; then
            required_files+=("package.json")
          fi
          
          missing=()
          for file in "${required_files[@]}"; do
            [ ! -f "$file" ] && missing+=("$file")
          done
          
          if [ ${#missing[@]} -ne 0 ]; then
            echo "❌ Missing: ${missing[*]}"
            exit 1
          fi
          
          echo "✅ All required files present"

      - name: Check for exposed secrets
        run: |
          echo "🔍 Scanning for exposed secrets..."
          if grep -r "sk-ant-\\|sk-proj-\\|ghp_\\|gho_" . \
             --exclude-dir=.git \
             --exclude-dir=node_modules \
             --exclude-dir=venv 2>/dev/null; then
            echo "❌ Found exposed secrets!"
            exit 1
          fi
          echo "✅ No exposed secrets"

  docker-build-test:
    name: 🐳 Docker Build & Test
    runs-on: ubuntu-latest
    needs: validate-structure
    
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          echo "🏗️ Building..."
          docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: Run container
        run: |
          echo "🚀 Starting container..."
          docker run -d \
            --name test-container \
            -p ${{ env.PORT }}:${{ env.PORT }} \
            -e PORT=${{ env.PORT }} \
            ${{ env.DOCKER_IMAGE }}
          
          echo "⏳ Waiting for startup..."
          sleep 30

      - name: Test health endpoint
        run: |
          echo "🩺 Testing /health..."
          max_attempts=5
          for i in $(seq 1 $max_attempts); do
            if curl -f http://localhost:${{ env.PORT }}/health; then
              echo "✅ Health check passed"
              exit 0
            fi
            sleep 5
          done
          
          echo "❌ Health check failed"
          docker logs test-container
          exit 1

      - name: Cleanup
        if: always()
        run: |
          docker stop test-container || true
          docker rm test-container || true

  summary:
    name: 📊 Summary
    runs-on: ubuntu-latest
    needs: [validate-structure, docker-build-test]
    if: always()
    
    steps:
      - name: Results
        run: |
          echo "## 🚀 CI/CD Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.validate-structure.result }}" = "success" ] && \
             [ "${{ needs.docker-build-test.result }}" = "success" ]; then
            echo "✅ **Ready for production**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Fixes needed**" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Structure: ${{ needs.validate-structure.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker: ${{ needs.docker-build-test.result }}" >> $GITHUB_STEP_SUMMARY
